apis:
  - aid: easyship:easyship-api
    name: Easyship API
    description: >-
      The Easyship API allows e-commerce platforms and merchants to programmatically
      compare carrier rates across 250+ integrated couriers, generate shipping labels,
      manage shipments and tracking, schedule courier pickups, handle returns, and
      calculate duties and taxes for international parcels. Authentication uses OAuth 2.0
      bearer tokens and the surface includes shipments, rates, labels, addresses, pickups,
      trackings, manifests, webhooks, products, boxes, and insurance.
    humanURL: https://developers.easyship.com/
