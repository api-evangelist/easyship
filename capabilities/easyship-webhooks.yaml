naftiko: 1.0.0-alpha2
info:
  label: Easyship API — Webhooks
  description: 'Easyship API — Webhooks. Event-subscription capability for shipment and tracking notifications.'
  tags:
    - Easyship
    - Webhooks
    - Shipping
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      EASYSHIP_API_TOKEN: EASYSHIP_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: easyship-webhooks
      baseUri: https://api.easyship.com/2024-09
      description: Easyship API — Webhooks business capability.
      resources:
        - name: webhooks
          path: /webhooks
          operations:
            - name: listwebhooks
              method: GET
              description: List Webhooks
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters: []
            - name: createwebhook
              method: POST
              description: Create a Webhook
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Webhook subscription with url and events
                  required: true
      authentication:
        type: bearer
        token: '{{env.EASYSHIP_API_TOKEN}}'
  exposes:
    - type: rest
      namespace: easyship-webhooks-rest
      port: 8080
      description: REST adapter for Easyship API — Webhooks.
      resources:
        - path: /v1/webhooks
          name: webhooks
          description: REST surface for webhooks.
          operations:
            - method: GET
              name: listwebhooks
              description: List Webhooks
              call: easyship-webhooks.listwebhooks
              outputParameters:
                - type: object
                  mapping: $.
            - method: POST
              name: createwebhook
              description: Create a Webhook
              call: easyship-webhooks.createwebhook
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: easyship-webhooks-mcp
      port: 9090
      transport: http
      description: MCP adapter for Easyship API — Webhooks.
      tools:
        - name: list-webhooks
          description: List Webhooks
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: easyship-webhooks.listwebhooks
          outputParameters:
            - type: object
              mapping: $.
        - name: create-webhook
          description: Create a Webhook
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: easyship-webhooks.createwebhook
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
