naftiko: 1.0.0-alpha2
info:
  label: Easyship API — Trackings
  description: 'Easyship API — Trackings. Normalized multi-courier package tracking.'
  tags:
    - Easyship
    - Trackings
    - Shipping
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      EASYSHIP_API_TOKEN: EASYSHIP_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: easyship-trackings
      baseUri: https://api.easyship.com/2024-09
      description: Easyship API — Trackings business capability.
      resources:
        - name: trackings
          path: /trackings
          operations:
            - name: listtrackings
              method: GET
              description: List Trackings
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters: []
            - name: createtracking
              method: POST
              description: Create a Tracking
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
        - name: trackings-Id
          path: /trackings/{Id}
          operations:
            - name: gettracking
              method: GET
              description: Show a Tracking
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: Id
                  in: path
                  type: string
                  required: true
      authentication:
        type: bearer
        token: '{{env.EASYSHIP_API_TOKEN}}'
  exposes:
    - type: rest
      namespace: easyship-trackings-rest
      port: 8080
      description: REST adapter for Easyship API — Trackings.
      resources:
        - path: /v1/trackings
          name: trackings
          description: REST surface for trackings.
          operations:
            - method: GET
              name: listtrackings
              description: List Trackings
              call: easyship-trackings.listtrackings
              outputParameters:
                - type: object
                  mapping: $.
            - method: POST
              name: createtracking
              description: Create a Tracking
              call: easyship-trackings.createtracking
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/trackings/{id}
          name: trackings-id
          description: REST surface for trackings-Id.
          operations:
            - method: GET
              name: gettracking
              description: Show a Tracking
              call: easyship-trackings.gettracking
              with:
                Id: rest.Id
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: easyship-trackings-mcp
      port: 9090
      transport: http
      description: MCP adapter for Easyship API — Trackings.
      tools:
        - name: list-trackings
          description: List Trackings
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: easyship-trackings.listtrackings
          outputParameters:
            - type: object
              mapping: $.
        - name: create-tracking
          description: Create a Tracking
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: easyship-trackings.createtracking
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: get-tracking
          description: Show a Tracking
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: easyship-trackings.gettracking
          with:
            Id: tools.Id
          outputParameters:
            - type: object
              mapping: $.
